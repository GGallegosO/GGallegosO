name: Generate Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: GitHub Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GGallegosO
          base: languages, activity
          output_action: branch
          committer_branch: stats-output
          filename: stats.svg

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GGallegosO
          base: ""
          plugin_languages: yes
          output_action: branch
          committer_branch: languages-output
          filename: languages.svg
